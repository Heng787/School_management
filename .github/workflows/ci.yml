name: CI

on:
  pull_request:
    branches: [main, staging]

jobs:
  lint-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Skip lint/format if scripts aren't defined in package.json, otherwise uncomment
      # - name: Lint
      #   run: npm run lint
      - name: Security Audit
        run: npm audit --audit-level=high
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}

  test:
    runs-on: ubuntu-latest
    needs: lint-and-security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run Unit Tests
        run: npm run test
      - name: Build Application (for E2E)
        run: npm run build
      # Playwright E2E tests would require more setup (browsers), 
      # usually handled by @playwright/test action or installing browsers.
      # For now, we'll stick to unit tests.

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Build Application
        run: npm run build
